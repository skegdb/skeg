name: Docker publish

# Publishes a container image to ghcr.io on every release-track event.
#
# - push to `release` → publishes `:release-edge` and `:sha-<short>`
#   (this is the staging build that follows main into release; users who
#   want "what is about to ship" pull this tag)
# - push tag `v*`     → publishes the version tag (e.g. `:0.3.3`) plus
#   `:latest` (immutable shipped artefact tracking crates.io / brew)
# - manual dispatch   → publishes the user-provided tag (defaults to the
#   short SHA), useful for back-publishing a stable image for a code state
#   that has already shipped under crates.io / brew.
#
# Pushes to feature branches and to `main` do NOT trigger an image
# publish. Iteration on main happens via the CI workflow alone; the
# Docker layer is intentionally gated to the release track to keep
# ghcr storage tidy and avoid noise on the public image listing.
on:
  push:
    branches: [release]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 0.1.1). Defaults to short SHA.'
        required: false
        type: string
      also_latest:
        description: 'Also push to :latest'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: derive tags
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          REF="${GITHUB_REF}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ github.event.inputs.tag }}"
            PRIMARY="${INPUT_TAG:-$SHA_SHORT}"
            TAGS="ghcr.io/skegdb/skeg:${PRIMARY}\nghcr.io/skegdb/skeg:sha-${SHA_SHORT}"
            if [ "${{ github.event.inputs.also_latest }}" = "true" ]; then
              TAGS="${TAGS}\nghcr.io/skegdb/skeg:latest"
            fi
          elif [[ "${REF}" == refs/tags/v* ]]; then
            # Release tag: strip the leading `v` so the image tag is
            # `0.3.3` (matching crates.io / brew). Also tag :latest.
            VERSION="${REF#refs/tags/v}"
            TAGS="ghcr.io/skegdb/skeg:${VERSION}\nghcr.io/skegdb/skeg:latest\nghcr.io/skegdb/skeg:sha-${SHA_SHORT}"
          else
            # Push to the `release` branch: staging-edge build.
            TAGS="ghcr.io/skegdb/skeg:release-edge\nghcr.io/skegdb/skeg:sha-${SHA_SHORT}"
          fi
          {
            echo "tags<<EOF"
            printf "%b\n" "$TAGS"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/skegdb/skeg
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=Vector + KV store, SSD-primary, RAM-frugal.
