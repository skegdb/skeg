name: Docker publish

# Publishes a container image to ghcr.io independent of the release/tag cycle.
#
# - push to main → publishes `:edge` and `:sha-<short>`
# - manual dispatch → publishes the user-provided tag (defaults to the
#   short SHA), useful for back-publishing a stable image for a code state
#   that has already shipped under crates.io / brew (e.g. v0.1.1 today).
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 0.1.1). Defaults to short SHA.'
        required: false
        type: string
      also_latest:
        description: 'Also push to :latest'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: derive tags
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ github.event.inputs.tag }}"
            PRIMARY="${INPUT_TAG:-$SHA_SHORT}"
            TAGS="ghcr.io/skegdb/skeg:${PRIMARY}\nghcr.io/skegdb/skeg:sha-${SHA_SHORT}"
            if [ "${{ github.event.inputs.also_latest }}" = "true" ]; then
              TAGS="${TAGS}\nghcr.io/skegdb/skeg:latest"
            fi
          else
            TAGS="ghcr.io/skegdb/skeg:edge\nghcr.io/skegdb/skeg:sha-${SHA_SHORT}"
          fi
          {
            echo "tags<<EOF"
            printf "%b\n" "$TAGS"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/skegdb/skeg
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=Vector + KV store, SSD-primary, RAM-frugal.
