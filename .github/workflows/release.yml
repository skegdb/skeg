name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the publish steps (crates.io + brew bump). Build binaries only."
        required: false
        type: boolean
        default: true

# Three concurrent jobs: publish crates, build & upload binaries, then
# (final) bump the Homebrew tap formula.
#
# `dry_run` (manual trigger only) skips publish-crates and bump-homebrew
# so you can validate the binary build pipeline without releasing.

# `contents: write` is required by softprops/action-gh-release to
# create/update the GitHub Release for the tag.
permissions:
  contents: write

jobs:
  guard:
    # Reject tags that do not point at a commit reachable from `release`.
    # Convention: only the `release` branch is rolled forward to a
    # publishable state; tags created elsewhere are mistakes.
    # On `workflow_dispatch` this job is a no-op so the downstream
    # `needs: guard` still resolves to "ok".
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 0
      - name: tag must be reachable from origin/release
        if: github.event_name == 'push'
        run: |
          set -e
          git fetch origin release:refs/remotes/origin/release
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/release; then
            echo "::error::tag ${{ github.ref_name }} (commit $GITHUB_SHA) is not reachable from origin/release"
            exit 1
          fi
          echo "ok: tag reachable from release"

  publish-crates:
    if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: publish library + server crates in dep order
        # `skeg-server` is published since the open-core refactor moved
        # the multi-tenant layer to a separate BUSL crate. The
        # `skeg-tenant` wrapper consumes `skeg-server` from crates.io.
        #
        # The loop is idempotent: each crate is skipped if its version
        # is already on crates.io. This lets a partially-failed run
        # (e.g. rate limit on a single crate) be resumed by re-running
        # the job without `cargo publish` erroring on the crates that
        # already shipped.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -eo pipefail
          for crate in skeg-proto skeg-simd skeg-platform skeg-resp3 skeg-core skeg-vector skeg-server; do
            echo "::group::publish $crate"
            if out=$(cd crates/$crate && cargo publish --locked 2>&1); then
              echo "$out"
              sleep 30
            elif echo "$out" | grep -q "already exists on crates.io index"; then
              echo "$out"
              echo "$crate: already on crates.io, continuing"
            else
              echo "$out"
              exit 1
            fi
            echo "::endgroup::"
          done

  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        # v0.1 targets aarch64 only. NEON SIMD kernels are aarch64-
        # specific; x86_64 builds would compile via the scalar
        # fallback and the published bench numbers would not apply.
        # Add x86_64 once an AVX2 path lands.
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    needs: guard
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }} \
            --bin skeg --bin skeg-resp3 -p skeg-server --locked
      - name: package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf skeg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz skeg skeg-resp3
          shasum -a 256 skeg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > skeg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          files: |
            target/${{ matrix.target }}/release/skeg-*.tar.gz
            target/${{ matrix.target }}/release/skeg-*.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: skeg-${{ github.sha }}-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/skeg-*.tar.gz
            target/${{ matrix.target }}/release/skeg-*.tar.gz.sha256

  # Two bump jobs, one per platform. Each runs on its own OS so that the
  # Ruby `if OS.mac? ... elsif OS.linux?` block in Formula/skeg.rb is
  # evaluated to the matching branch, and mislav/bump-homebrew-formula-action
  # rewrites only that branch's url/sha256. The linux job needs the mac
  # one (via needs:) to serialise pushes to the tap.

  bump-homebrew-mac:
    if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
    needs: build-binaries
    runs-on: macos-latest
    steps:
      - name: fetch sha256 of darwin tarball
        id: sha
        run: |
          curl -sLo /tmp/skeg.sha "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/skeg-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256"
          echo "value=$(awk '{print $1}' /tmp/skeg.sha)" >> "$GITHUB_OUTPUT"
      - uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: skeg
          formula-path: Formula/skeg.rb
          homebrew-tap: skegdb/homebrew-tap
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/skeg-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          download-sha256: ${{ steps.sha.outputs.value }}
          create-pullrequest: false
          create-branch: false
          commit-message: |
            skeg {{version}}: bump aarch64-apple-darwin sha256
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

  bump-homebrew-linux:
    if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
    needs: bump-homebrew-mac
    runs-on: ubuntu-latest
    steps:
      - name: fetch sha256 of linux tarball
        id: sha
        run: |
          curl -sLo /tmp/skeg.sha "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/skeg-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz.sha256"
          echo "value=$(awk '{print $1}' /tmp/skeg.sha)" >> "$GITHUB_OUTPUT"
      - uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: skeg
          formula-path: Formula/skeg.rb
          homebrew-tap: skegdb/homebrew-tap
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/skeg-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz
          download-sha256: ${{ steps.sha.outputs.value }}
          create-pullrequest: false
          create-branch: false
          commit-message: |
            skeg {{version}}: bump aarch64-unknown-linux-gnu sha256
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
