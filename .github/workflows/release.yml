name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the publish steps (crates.io + brew bump). Build binaries only."
        required: false
        type: boolean
        default: true

# Three concurrent jobs: publish crates, build & upload binaries, then
# (final) bump the Homebrew tap formula.
#
# `dry_run` (manual trigger only) skips publish-crates and bump-homebrew
# so you can validate the binary build pipeline without releasing.

# `contents: write` for GitHub Release artifact uploads.
# `packages: write` for pushing the container image to ghcr.io.
permissions:
  contents: write
  packages: write

jobs:
  guard:
    # Reject tags that do not point at a commit reachable from `release`.
    # Convention: only the `release` branch is rolled forward to a
    # publishable state; tags created elsewhere are mistakes.
    # On `workflow_dispatch` this job is a no-op so the downstream
    # `needs: guard` still resolves to "ok".
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        if: github.event_name == 'push'
        with:
          fetch-depth: 0
      - name: tag must be reachable from origin/release
        if: github.event_name == 'push'
        run: |
          set -e
          git fetch origin release:refs/remotes/origin/release
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/release; then
            echo "::error::tag ${{ github.ref_name }} (commit $GITHUB_SHA) is not reachable from origin/release"
            exit 1
          fi
          echo "ok: tag reachable from release"

  publish-crates:
    if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags needed to diff each crate against the
          # previous release and skip unchanged ones.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: publish changed crates in dep order
        # Per-crate versioning: each crate carries its own `version` and
        # is published only when its source tree changed since the
        # previous tag. Unchanged crates are skipped without invoking
        # `cargo publish` (avoids version-bump noise on crates.io when a
        # release touches only some crates).
        #
        # Failure modes still covered:
        # - First tag (no previous): every crate is published.
        # - Re-run of a partially-failed publish: the "already exists on
        #   crates.io index" branch still skips already-shipped crates.
        # - Manual workflow_dispatch with dry_run=false: also publishes
        #   only changed crates.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -eo pipefail
          # Find the previous release tag (excluding HEAD). On the very
          # first release, `prev_tag` is empty and every crate publishes.
          prev_tag=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | grep -v "^${GITHUB_REF_NAME}\$" | head -n 1 || true)
          if [ -n "$prev_tag" ]; then
            echo "diffing against previous tag: $prev_tag"
          else
            echo "no previous tag found; will publish every crate"
          fi
          for crate in skeg-proto skeg-simd skeg-platform skeg-telemetry skeg-resp3 skeg-core skeg-vector skeg-tenant skeg-server skeg-server-tenant skeg-multi-tenant; do
            echo "::group::publish $crate"
            if [ -n "$prev_tag" ] && git diff --quiet "$prev_tag" HEAD -- "crates/$crate"; then
              echo "$crate: no changes since $prev_tag, skipping cargo publish"
              echo "::endgroup::"
              continue
            fi
            if out=$(cd crates/$crate && cargo publish --locked 2>&1); then
              echo "$out"
              sleep 30
            elif echo "$out" | grep -q "already exists on crates.io index"; then
              echo "$out"
              echo "$crate: already on crates.io, continuing"
            else
              echo "$out"
              exit 1
            fi
            echo "::endgroup::"
          done

  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        # v0.1 targets aarch64 only. NEON SIMD kernels are aarch64-
        # specific; x86_64 builds would compile via the scalar
        # fallback and the published bench numbers would not apply.
        # Add x86_64 once an AVX2 path lands.
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    needs: guard
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }} \
            --bin skeg --bin skeg-resp3 -p skeg-server --locked
      - name: package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf skeg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz skeg skeg-resp3
          shasum -a 256 skeg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > skeg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - uses: softprops/action-gh-release@v3
        if: github.event_name == 'push'
        with:
          files: |
            target/${{ matrix.target }}/release/skeg-*.tar.gz
            target/${{ matrix.target }}/release/skeg-*.tar.gz.sha256
      - uses: actions/upload-artifact@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          name: skeg-${{ github.sha }}-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/skeg-*.tar.gz
            target/${{ matrix.target }}/release/skeg-*.tar.gz.sha256

  # Build and push the multi-binary container image to ghcr.io.
  # The image bundles both `skeg` (native protocol, 7379) and
  # `skeg-resp3` (Redis-compat, 6379). Default entrypoint is `skeg`.
  # Built natively on an arm64 runner; published tags:
  #   ghcr.io/skegdb/skeg:<version>   (e.g. 0.1.1)
  #   ghcr.io/skegdb/skeg:latest      (only on tag pushes)
  docker:
    # Always attempts to build (validates Dockerfile on every release run).
    # Only pushes to ghcr.io on real tag releases.
    needs: guard
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: derive version from tag
        id: meta
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          load:  ${{ github.event_name != 'push' }}
          tags: |
            ghcr.io/skegdb/skeg:${{ steps.meta.outputs.version }}
            ${{ github.event_name == 'push' && 'ghcr.io/skegdb/skeg:latest' || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/skegdb/skeg
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=Vector + KV store, SSD-primary, RAM-frugal.

  # Custom one-shot brew bump. mislav's action stops working on the
  # second invocation because the version field is already at the
  # target ("Skipping: the formula is already at version X"), which
  # would leave the linux branch's sha256 stale. This job clones the
  # tap, rewrites `version`, the mac sha256, and the linux sha256 in
  # a single commit, then pushes. Both url lines are kept as the
  # `v#{version}` template, so only the version + the two checksums
  # ever need touching here.
  bump-homebrew:
    if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
    needs: build-binaries
    runs-on: ubuntu-latest
    env:
      FORMULA: Formula/skeg.rb
      DOWNLOAD_BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
      TARBALL_PREFIX: skeg-${{ github.ref_name }}
    steps:
      - name: fetch per-platform sha256 from the GitHub Release
        id: sha
        run: |
          set -eo pipefail
          MAC=$(curl -sL "${DOWNLOAD_BASE}/${TARBALL_PREFIX}-aarch64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          LINUX=$(curl -sL "${DOWNLOAD_BASE}/${TARBALL_PREFIX}-aarch64-unknown-linux-gnu.tar.gz.sha256" | awk '{print $1}')
          [ -n "$MAC" ] && [ -n "$LINUX" ] || { echo "missing sha256"; exit 1; }
          echo "mac=$MAC" >> "$GITHUB_OUTPUT"
          echo "linux=$LINUX" >> "$GITHUB_OUTPUT"
      - name: clone the tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          set -eo pipefail
          git clone --depth=1 "https://x-access-token:${TOKEN}@github.com/skegdb/homebrew-tap.git" tap
      - name: rewrite version + per-platform sha256
        env:
          MAC_SHA: ${{ steps.sha.outputs.mac }}
          LINUX_SHA: ${{ steps.sha.outputs.linux }}
        run: |
          set -eo pipefail
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          python3 - "tap/${FORMULA}" "$VERSION_NO_V" "$MAC_SHA" "$LINUX_SHA" <<'PY'
          import re, sys
          path, version, mac_sha, linux_sha = sys.argv[1:5]
          lines = open(path).read().split('\n')
          state = None
          for i, line in enumerate(lines):
              stripped = line.strip()
              if re.match(r'if OS\.mac\?', stripped):
                  state = 'mac'
              elif re.match(r'elsif OS\.linux\?', stripped):
                  state = 'linux'
              elif stripped == 'end':
                  state = None
              if stripped.startswith('version "'):
                  lines[i] = re.sub(r'"[^"]*"', f'"{version}"', line, count=1)
              elif 'sha256 "' in line:
                  sha = mac_sha if state == 'mac' else linux_sha if state == 'linux' else None
                  if sha:
                      lines[i] = re.sub(r'sha256 "[^"]*"', f'sha256 "{sha}"', line, count=1)
          open(path, 'w').write('\n'.join(lines))
          PY
      - name: commit and push
        run: |
          set -eo pipefail
          cd tap
          git config user.name "skegdb-bot"
          git config user.email "bot@users.noreply.github.com"
          git add "$FORMULA"
          if git diff --cached --quiet; then
            echo "formula unchanged; nothing to commit"
            exit 0
          fi
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          git commit -m "skeg ${VERSION_NO_V}: bump version + aarch64 darwin/linux sha256"
          git push origin main
